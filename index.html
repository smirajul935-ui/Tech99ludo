<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TechLudo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen" class="screen active">
        <div class="loader"></div>
        <h2>Loading TechLudo...</h2>
    </div>

    <div id="auth-screen" class="screen">
        <div class="glass-card">
            <img src="https://iili.io/qIVRdDQ.md.png" alt="TechLudo Logo" class="logo">
            <h1 class="title">TechLudo</h1>
            <input type="text" id="player-name" placeholder="Enter Your Name" maxlength="20">
            <div class="buttons">
                <button id="btn-create" class="btn gradient-btn">Create Match</button>
                <button id="btn-show-join" class="btn gradient-btn">Join Match</button>
            </div>
            <div id="join-section" class="hidden">
                <input type="text" id="match-code-input" placeholder="Enter Match Code">
                <button id="btn-join" class="btn gradient-btn">Join Now</button>
            </div>
            <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <div id="waiting-screen" class="screen">
        <div class="glass-card">
            <h2>Match Created!</h2>
            <div class="match-code-box">
                <p>Match Code:</p>
                <h1 id="display-match-code">Tech_1</h1>
            </div>
            <p class="pulse-text">Waiting for player to join...</p>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-bar">
            <div class="player-info" id="p2-info">
                <span class="p-name">Player 2</span>
                <div class="colors-indicator">
                    <span class="color-dot green"></span>
                    <span class="color-dot blue"></span>
                </div>
            </div>
            <div class="timer-box">
                Time Left: <span id="timer-display">50</span>s
            </div>
        </div>

        <div class="board-container">
            <div id="ludo-board"></div>
        </div>

        <div class="bottom-bar">
            <div class="player-info" id="p1-info">
                <span class="p-name">Player 1</span>
                <div class="colors-indicator">
                    <span class="color-dot red"></span>
                    <span class="color-dot yellow"></span>
                </div>
            </div>
            <div class="controls">
                <div id="dice-container">
                    <div id="dice" class="dice">1</div>
                </div>
                <button id="btn-roll" class="btn gradient-btn" disabled>Roll Dice 🎲</button>
            </div>
        </div>
    </div>

    <div id="winner-popup" class="hidden popup-overlay">
        <div class="glass-card popup-content">
            <h1>Winner 🎉</h1>
            <h2 id="winner-name">Player</h2>
            <div class="buttons">
                <button id="btn-play-again" class="btn gradient-btn">Play Again</button>
                <button id="btn-home" class="btn gradient-btn">Return Home</button>
            </div>
        </div>
    </div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
